# 复制到 YOLO 检测模型仓：.github/workflows/infer_fruit.yml

name: Fruit detection (YOLOv5s)

on:
  push:
    branches: [main]
    paths:
      - 'incoming/**'
    paths-ignore:
      - 'incoming/**/*.afsa.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  infer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Route by sidecar (.afsa.json)
        id: route
        env:
          AFSA_SCAN_ALL: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: python3 .github/scripts/afsa_resolve_sidecar.py

      - name: Mark repo kind
        run: mkdir -p out && echo detect > out/afsa_repo_kind.txt

      - name: Prepare category-only staging
        if: steps.route.outputs.category_count != '0'
        run: python3 .github/scripts/afsa_prepare_infer_staging.py

      - uses: actions/setup-python@v5
        if: steps.route.outputs.category_count != '0' || github.event_name == 'workflow_dispatch'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.route.outputs.category_count != '0' || github.event_name == 'workflow_dispatch'
        run: |
          pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install pillow ultralytics opencv-python-headless

      - name: Run fruit category detection
        if: steps.route.outputs.category_count != '0' || github.event_name == 'workflow_dispatch'
        run: |
          INCOMING_DIR="/tmp/afsa_infer_staging"
          if [ ! -d "$INCOMING_DIR/incoming" ] && [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INCOMING_DIR="incoming"
          fi
          python scripts/infer_fruit_detect.py \
            --device cpu \
            --weights models/yolov5s_fruit_detect_best.pt \
            --incoming "$INCOMING_DIR" \
            --output output/predictions_partial.json

      - name: Merge predictions (incl. growth/disease skipped)
        if: always()
        run: python3 .github/scripts/afsa_finalize_predictions.py

      - name: Summary
        if: always() && hashFiles('output/predictions.json') != ''
        run: |
          echo "## AFSA 检测结果" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat output/predictions.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: predictions
          path: output/predictions.json
          if-no-files-found: ignore
